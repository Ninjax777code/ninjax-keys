<!DOCTYPE html>
<html>
<head>
    <title>Ninjax Hub - Gerar Keys</title>
    <style>
        body { background: #0a0a0f; color: #fff; font-family: Arial; text-align: center; padding: 50px; }
        .container { background: #141420; padding: 30px; border-radius: 10px; width: 400px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; background: #1a1a2e; border: 1px solid #333; color: #fff; border-radius: 5px; }
        button { background: #8232c8; cursor: pointer; font-weight: bold; }
        button:hover { background: #9a40e0; }
        #result { margin-top: 15px; color: #0f0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Ninjax Keys</h1>
        <input id="webhook" type="password" placeholder="Cole seu Webhook aqui">
        <select id="duration">
            <option value="1">1 Hora</option>
            <option value="5">5 Horas</option>
            <option value="12">12 Horas</option>
            <option value="24">24 Horas</option>
            <option value="0">Permanente</option>
        </select>
        <input id="amount" type="number" value="1" min="1" max="10" placeholder="Quantidade">
        <button onclick="generate()">🎲 Gerar Key</button>
        <div id="result"></div>
    </div>
    <script>
        async function generate() {
            const webhook = document.getElementById('webhook').value;
            const duration = parseInt(document.getElementById('duration').value);
            const amount = parseInt(document.getElementById('amount').value);
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let keys = [];
            
            for (let j = 0; j < amount; j++) {
                let key = '';
                for (let i = 0; i < 16; i++) key += chars[Math.floor(Math.random() * chars.length)];
                let expires = duration === 0 ? 'permanent' : new Date(Date.now() + duration * 3600000).toISOString().replace('T', ' ').substring(0, 16);
                keys.push({key, expires});
            }
            
            let msg = '🔑 **Keys Geradas**\n';
            keys.forEach(k => msg += `\`${k.key}\` | Expira: ${k.expires}\n`);
            
            const res = await fetch(webhook + '?wait=true', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: msg})
            });
            
            document.getElementById('result').innerHTML = res.ok ? '✅ Keys geradas! Verifique o Discord.' : '❌ Erro!';
        }
    </script>
</body>
</html>
