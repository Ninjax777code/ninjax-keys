<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninjax Hub - Painel de Keys</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #141420;
            border-radius: 16px;
            padding: 40px;
            width: 500px;
            border: 1px solid #2a2a3a;
        }
        h1 {
            color: #8232c8;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 13px;
        }
        select, input {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #8232c8;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:hover { background: #9a40e0; }
        .key-result {
            margin-top: 20px;
            padding: 20px;
            background: #0d0d18;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            display: none;
        }
        .key-code {
            font-size: 22px;
            text-align: center;
            font-family: monospace;
            color: #00ff88;
            letter-spacing: 3px;
            word-break: break-all;
        }
        .key-info {
            text-align: center;
            color: #aaa;
            margin-top: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Ninjax Hub Keys</h1>
        
        <label>Tipo de Key</label>
        <select id="keyType">
            <option value="1">1 Hora</option>
            <option value="5">5 Horas</option>
            <option value="12">12 Horas</option>
            <option value="24">24 Horas</option>
            <option value="permanent">Permanente</option>
        </select>
        
        <label>Quantidade</label>
        <input type="number" id="keyAmount" value="1" min="1" max="10">
        
        <button class="btn" onclick="generateKey()">🎲 Gerar Key</button>
        
        <div class="key-result" id="keyResult">
            <div class="key-code" id="keyCode"></div>
            <div class="key-info" id="keyInfo"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.npoint.io/709752da80e0d123f59b';
        
        async function generateKey() {
            const type = document.getElementById('keyType').value;
            const amount = parseInt(document.getElementById('keyAmount').value) || 1;
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            
            // Buscar keys atuais
            const res = await fetch(API_URL);
            const data = await res.json();
            let allKeys = data.keys || [];
            
            // Gerar novas keys
            let newKeys = [];
            for (let j = 0; j < amount; j++) {
                let key = '';
                for (let i = 0; i < 16; i++) {
                    key += chars[Math.floor(Math.random() * chars.length)];
                }
                const now = Date.now();
                const expires = type === 'permanent' ? 'permanent' : now + (parseInt(type) * 3600000);
                newKeys.push({ key: key, type: type, expires: expires, created: now });
            }
            
            // Atualizar API
            allKeys = [...allKeys, ...newKeys];
            await fetch(API_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keys: allKeys, updated: Date.now() })
            });
            
            // Mostrar resultado
            document.getElementById('keyCode').textContent = newKeys.map(k => k.key).join('\n');
            document.getElementById('keyInfo').textContent = `Tipo: ${type === 'permanent' ? 'Permanente' : type + 'h'} | Quantidade: ${amount} | Expira: ${type === 'permanent' ? 'Nunca' : new Date(newKeys[0].expires).toLocaleString()}`;
            document.getElementById('keyResult').style.display = 'block';
        }
    </script>
</body>
</html>
